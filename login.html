<!DOCTYPE html>
<html>
<head>
<meta charset = "UTF-8">
<title>login form</title>
<script src="script.js" defer></script>
</head>
<body>
<header>
<h1>LOGIN FORM</h1>
<button type="button" id="darkModeBtn">Toggle Dark Mode</button>
</header>
<main>
	<form id="loginForm" action = "#" method="POST">
	
	<fieldset>
		<legend>Details</legend>
		<label for="username">Username</label><br>
		<input type = "text" id="username" name="username" placeholder="enter name" required><br>
		<span id="charCount">0/20 characters</span><br><br>
		
		<label for="mail">E-mail address</label>
		<input type = "email" id="mail" name="email" placeholder="example@mail.com" required><br><br>
		
		<label for="pass">Password</label>
		<input type="password" id="pass" name="password" placeholder="enter password" required><br>
		<input type="checkbox" id="showPass">
		<label for="showPass">Show Password</label><br><br>
		
	</fieldset><br>
	
	<fieldset>
		<legend>Personal info</legend>
		
		<p>Gender</p>
			<input type="radio" id="male" name="gender" value="male">
			<label for="male">Male</label>
		
			<input type="radio" id="female" name="gender" value="female">
			<label for="female">Female</label>
		<br><br>
		<label for="country">Country</label>
		<select id="country" name="country">
			<option value="">--select country--</option>
			<option value="in">India</option>
			<option value="us">USA</option>
			<option value="uk">UK</option>
		</select>
		
		<p>Interests</p>
		<input type="checkbox" id="html" name="preferences" value="html">
		<label for="html">HTML5</label>
		<input type="checkbox" id="css" name="preferences" value="css">
		<label for="css">CSS</label>
	</fieldset>
	<br>

	<p id="message"></p>
	<p id="userInfo"></p>

	<button type="submit">SUBMIT</button>
	<button type="button" id="resetBtn">RESET</button>
	</form>
</main>
</body>
</html>
